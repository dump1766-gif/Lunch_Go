<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>午餐吃什麼拉霸機 🎰</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background-color: #f7f9fc; 
        }
        h1 { color: #333; }
        #slot-machine { 
            font-size: 40px; 
            font-weight: bold; 
            color: #ff5722; 
            margin: 30px 0; 
            min-height: 60px; 
        }
        button { 
            font-size: 20px; 
            padding: 12px 24px; 
            background-color: #4CAF50; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        button:hover { background-color: #45a049; }
        /* 當按鈕被禁用時的樣式 (例如資料還沒載入完成時) */
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        #map-btn { 
            display: none; 
            margin-top: 20px; 
            padding: 12px 24px;
            background-color: #4285F4; 
            color: white;
            text-decoration: none; 
            border-radius: 8px;
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        #map-btn:hover { background-color: #357ae8; }
        #status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>🎰 辦公室專屬午餐拉霸機</h1>
    <div id="status">🔄 正在載入最新雲端菜單...</div>
    <div id="slot-machine">❓ 等待抽籤</div>
    
    <button id="spin-btn" onclick="startSpin()" disabled>開始抽籤</button>
    <br>
    <a id="map-btn" href="#" target="_blank">在地圖上尋找</a>

    <script>
        // 🚨 請將下方單引號內的網址，替換成您剛剛複製的 Google 試算表 CSV 網址！
        const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTL40EHlvYd4fJTVAbp7Hbf8aKb81T24y5zZDKp3z8Yok0GcNgEz06nduGlDE-pB8boYt2LOvdbSXfF/pub?output=csv';
        
        // 宣告一個空的口袋名單，等待從雲端載入
        let restaurants = [];
        let spinInterval;

        // 網頁一載入，就去 Google 抓資料
        window.onload = async function() {
            try {
                // 發送請求去抓取 CSV 資料
                const response = await fetch(sheetCsvUrl);
                const csvData = await response.text();
                
                // 解析 CSV 資料
                parseCSV(csvData);
                
                // 更新畫面狀態
                document.getElementById('status').innerText = `✅ 成功載入 ${restaurants.length} 家餐廳！`;
                document.getElementById('spin-btn').disabled = false; // 解鎖抽籤按鈕
                document.getElementById('slot-machine').innerText = '準備就緒！';
            } catch (error) {
                document.getElementById('status').innerText = '❌ 載入菜單失敗，請確認試算表網址是否正確。';
                console.error("讀取表單發生錯誤：", error);
            }
        };

        // 將 CSV 轉換為程式看得懂的陣列格式的副程式
        function parseCSV(data) {
            // 用換行符號將每一列切開 (兼容 Windows 與 Mac 換行格式)
            const rows = data.split(/\r?\n/);
            
            // 從 i = 1 開始迴圈，這樣可以跳過第一列的「標題 (店名,地圖連結)」
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].trim() !== '') {
                    // 用逗號把店名和連結切開
                    const columns = rows[i].split(',');
                    // 確保這一行真的有兩個欄位 (店名和連結) 才加入名單
                    if (columns.length >= 2 && columns[0].trim() !== '') {
                        restaurants.push({
                            name: columns[0].trim(),
                            link: columns[1].trim()
                        });
                    }
                }
            }
        }

        // --- 以下為原本的抽籤動畫與顯示邏輯，完全不用改 ---
        function startSpin() {
            if (restaurants.length === 0) return; // 防呆機制
            const slot = document.getElementById('slot-machine');
            const mapBtn = document.getElementById('map-btn');
            const spinBtn = document.getElementById('spin-btn');

            mapBtn.style.display = 'none';
            spinBtn.disabled = true;

            let counter = 0;
            spinInterval = setInterval(() => {
                const randomItem = restaurants[Math.floor(Math.random() * restaurants.length)];
                slot.innerText = randomItem.name;
                counter++;
                if (counter > 20) {
                    clearInterval(spinInterval);
                    stopSpin();
                }
            }, 100);
        }

        function stopSpin() {
            const slot = document.getElementById('slot-machine');
            const mapBtn = document.getElementById('map-btn');
            const spinBtn = document.getElementById('spin-btn');

            const finalChoice = restaurants[Math.floor(Math.random() * restaurants.length)];
            slot.innerText = finalChoice.name;

            mapBtn.href = finalChoice.link;
            const cleanName = finalChoice.name.split(' ')[0];
            mapBtn.innerText = `🗺️ 帶我去吃【${cleanName}】！`;
            mapBtn.style.display = 'inline-block';

            spinBtn.disabled = false;
        }
    </script>
</body>
</html>
